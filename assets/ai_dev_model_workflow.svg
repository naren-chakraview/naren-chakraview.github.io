<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-intent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e9eab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-contract" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fceabb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8b500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-verify" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b09b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96c93d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-build" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c92d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f2fcfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-deploy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-op" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-monitor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#373b44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4286f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-evolve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f83600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9d423;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path d="M 100 200 Q 200 100 300 200 T 500 200 T 700 200 T 900 200 T 1100 200 T 1300 200 T 1500 200" 
        fill="none" stroke="#e0e0e0" stroke-width="40" stroke-linecap="round" opacity="0.3"/>

  <g transform="translate(100, 200)">
    <circle r="60" fill="url(#grad-intent)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">INTENT</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Gather requirements,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Define business goals</text>
    <path d="M-15 5 Q-25 5 -25 -5 Q-25 -15 -15 -15 Q-15 -25 0 -25 Q15 -25 15 -10 Q25 -10 25 5 L-15 5" fill="white" />
  </g>

  <g transform="translate(300, 200)">
    <circle r="60" fill="url(#grad-contract)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">CONTRACT AUTHORING</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Define correctness contracts,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Logic definition &amp; Rules</text>
    <rect x="-15" y="-20" width="30" height="35" rx="2" fill="white" />
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#f8b500" stroke-width="2" />
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#f8b500" stroke-width="2" />
  </g>

  <g transform="translate(500, 200)">
    <circle r="60" fill="url(#grad-verify)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">VERIFICATION</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Agent-based validation,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Audit report generation</text>
    <path d="M0 -20 L15 -15 L15 5 Q0 20 -15 5 L-15 -15 Z" fill="white" />
  </g>

  <g transform="translate(700, 200)">
    <circle r="60" fill="url(#grad-build)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">BUILD &amp; INTEGRATE</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Merge codebase,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Docker/Package artifacts</text>
    <path d="M0 -20 L18 -10 L18 10 L0 20 L-18 10 L-18 -10 Z" fill="white" opacity="0.9" />
  </g>

  <g transform="translate(900, 200)">
    <circle r="60" fill="url(#grad-deploy)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">DEPLOYMENT</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CI/CD Pipeline,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Staging &amp; Canary</text>
    <path d="M0 -25 L10 5 L0 0 L-10 5 Z" fill="white" />
  </g>

  <g transform="translate(1100, 200)">
    <circle r="60" fill="url(#grad-op)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">OPERATION</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">System execution,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Service delivery &amp; Scaling</text>
    <circle r="12" fill="white" />
    <rect x="-15" y="-2" width="30" height="4" fill="white" rx="1"/>
    <rect x="-2" y="-15" width="4" height="30" fill="white" rx="1"/>
  </g>

  <g transform="translate(1300, 200)">
    <circle r="60" fill="url(#grad-monitor)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">MONITORING</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Observe performance,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Drift &amp; Feedback detection</text>
    <rect x="-15" y="5" width="8" height="10" fill="white" />
    <rect x="-4" y="-5" width="8" height="20" fill="white" />
    <rect x="7" y="0" width="8" height="15" fill="white" />
  </g>

  <g transform="translate(1500, 200)">
    <circle r="60" fill="url(#grad-evolve)" filter="url(#shadow)" />
    <text y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16">EVOLUTION</text>
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Continuous learning,</text>
    <text y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Human-in-the-loop refinement</text>
    <path d="M-15 15 L0 -10 L15 15" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path d="M 1500 320 L 1500 380 L 100 380 L 100 320" fill="none" stroke="#546e7a" stroke-width="3" stroke-dasharray="10,5" />
  <path d="M 95 320 L 100 310 L 105 320 Z" fill="#546e7a" />
  <text x="800" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#546e7a">FEEDBACK LOOP (Continuous Improvement)</text>

</svg>
