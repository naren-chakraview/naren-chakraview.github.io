<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Streaming layers icon: three stacked horizontal bars suggesting Bronze/Silver/Gold -->
  <rect x="4" y="8"  width="40" height="9" rx="3" fill="#92400e"/>
  <rect x="4" y="20" width="40" height="9" rx="3" fill="#1e3a5f"/>
  <rect x="4" y="32" width="40" height="9" rx="3" fill="#14532d"/>
  <!-- Flow arrows between layers -->
  <polygon points="22,19 26,19 24,21" fill="#ffffff" opacity="0.7"/>
  <polygon points="22,31 26,31 24,33" fill="#ffffff" opacity="0.7"/>
</svg>
